<div
  class="min-h-screen flex items-center justify-center bg-gradient-to-br from-indigo-700 via-blue-600 to-cyan-500 p-4">
  <div
    class="flex flex-col md:flex-row bg-white/10 backdrop-blur-xl text-white rounded-3xl shadow-2xl overflow-hidden w-full max-w-4xl">

    <!-- Left section -->
    <div class="hidden md:flex md:w-1/2 bg-gradient-to-tr from-cyan-400 to-blue-600 items-center justify-center p-8">
      <div class="text-center">
        <h2 class="text-4xl font-bold mb-4 animate-bounce">🚛 Join Transport Portal</h2>
        <p class="text-sm text-white/80">Sign up and manage your transport business easily.</p>
      </div>
    </div>

    <!-- Right section (form) -->
    <div class="w-full md:w-1/2 p-8 md:p-12">
      <h2 class="text-3xl font-semibold mb-6 text-center md:text-left">Create an Account 📝</h2>

      <form *ngIf="step === 1" (ngSubmit)="signup()" class="space-y-4">
        <div>
          <label>Transporter / Company Name</label>
          <input type="text" [(ngModel)]="transporterName" name="transporterName" required
            class="w-full mt-1 px-4 py-2 rounded-lg bg-white/20 focus:bg-white/30 border border-white/30 outline-none placeholder-white/60"
            placeholder="Transporter or Company Name">
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
          <div>
            <label>Owner / Contact Name</label>
            <input type="text" [(ngModel)]="ownerName" name="ownerName" required
              class="w-full mt-1 px-4 py-2 rounded-lg bg-white/20 focus:bg-white/30 border border-white/30 outline-none placeholder-white/60"
              placeholder="Owner Name">
          </div>
          <div>
            <label>GST Number (optional)</label>
            <input type="text" [(ngModel)]="gstNo" name="gstNo"
              class="w-full mt-1 px-4 py-2 rounded-lg bg-white/20 focus:bg-white/30 border border-white/30 outline-none placeholder-white/60"
              placeholder="GST Number (if any)">
          </div>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
          <div>
            <label>Mobile Number</label>
            <input type="tel" [(ngModel)]="mobileNumber" name="mobileNumber" required
              class="w-full mt-1 px-4 py-2 rounded-lg bg-white/20 focus:bg-white/30 border border-white/30 outline-none placeholder-white/60"
              placeholder="10-digit mobile number">
          </div>
          <div>
            <label>WhatsApp Number</label>
            <input type="tel" [(ngModel)]="whatsappNumber" name="whatsappNumber"
              class="w-full mt-1 px-4 py-2 rounded-lg bg-white/20 focus:bg-white/30 border border-white/30 outline-none placeholder-white/60"
              placeholder="WhatsApp contact">
          </div>
        </div>

        <div>
          <label>Email</label>
          <input type="email" [(ngModel)]="email" name="email"
            class="w-full mt-1 px-4 py-2 rounded-lg bg-white/20 focus:bg-white/30 border border-white/30 outline-none placeholder-white/60"
            placeholder="you@example.com">
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
          <div>
            <label>Password</label>
            <div class="relative">
              <input [type]="showPassword ? 'text' : 'password'" [(ngModel)]="password" name="password" required
                class="w-full mt-1 px-4 py-2 rounded-lg bg-white/20 focus:bg-white/30 border border-white/30 outline-none placeholder-white/60"
                placeholder="Create a password">
              <button type="button" (click)="togglePassword()" class="absolute right-3 top-2.5 text-sm">
                <i class="material-icons">{{ showPassword ? 'visibility_off' : 'visibility' }}</i>
              </button>
            </div>
          </div>
          <div>
            <label>Confirm Password</label>
            <div class="relative">
              <input [type]="showConfirmPassword ? 'text' : 'password'" [(ngModel)]="confirmPassword" name="confirmPassword" required
                class="w-full mt-1 px-4 py-2 rounded-lg bg-white/20 focus:bg-white/30 border border-white/30 outline-none placeholder-white/60"
                placeholder="Confirm password">
              <button type="button" (click)="toggleConfirmPassword()" class="absolute right-3 top-2.5 text-sm">
                <i class="material-icons">{{ showConfirmPassword ? 'visibility_off' : 'visibility' }}</i>
              </button>
            </div>
          </div>
        </div>

        <button [disabled]="isLoading"
          class="w-full bg-gradient-to-r from-cyan-400 to-blue-500 hover:from-blue-500 hover:to-cyan-400 text-white py-2 rounded-lg font-semibold transition-transform hover:scale-105">
          {{ isLoading ? 'Creating...' : 'Sign Up' }}
        </button>

        <div class="text-center text-sm mt-4">
          Already have an account?
          <a (click)="routeTo('/auth/login')" class="font-semibold">Login</a>
        </div>
      </form>

      <form *ngIf="step === 2" (ngSubmit)="verifyOtp()" class="space-y-4">
        <div>
          <label>Mobile Number</label>
          <input type="tel" readonly [(ngModel)]="mobileNumber" name="mobileNumber" 
            class="w-full mt-1 px-4 py-2 rounded-lg bg-white/20 focus:bg-white/30 border border-white/30 outline-none placeholder-white/60"
            placeholder="10-digit mobile number">
        </div>

        <div>
          <label>OTP</label>
          <input type="text" [(ngModel)]="otp" name="otp" required
            class="w-full mt-1 px-4 py-2 rounded-lg bg-white/20 focus:bg-white/30 border border-white/30 outline-none placeholder-white/60"
            placeholder="Enter OTP">
        </div>

        <div class="flex gap-3">
          <button type="submit" [disabled]="isLoading"
            class="flex-1 bg-gradient-to-r from-cyan-400 to-blue-500 hover:from-blue-500 hover:to-cyan-400 text-white py-2 rounded-lg font-semibold transition-transform hover:scale-105">
            {{ isLoading ? 'Verifying...' : 'Verify OTP' }}
          </button>
          <button type="button" (click)="resendOtp()" [disabled]="isLoading"
            class="flex-none bg-transparent border border-white/30 text-white px-4 py-2 rounded-lg">
            Resend OTP
          </button>
        </div>

        <div class="text-center text-sm mt-4">
          <a (click)="step = 1" class="font-semibold">Edit details</a>
        </div>
      </form>
    </div>
  </div>
</div>
